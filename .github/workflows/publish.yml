name: Publish to npm + ClawHub

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  # On push to main: compute version and create a draft release
  draft-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Compute date-based version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +"%-Y.%-m.%-d")

          ALL_TAGS=$(gh api repos/${{ github.repository }}/git/refs/tags \
            --paginate --jq '.[].ref' 2>/dev/null || true)

          BASE_TAG="refs/tags/v${TODAY}"
          HAS_BASE=false
          if echo "$ALL_TAGS" | grep -qxF "$BASE_TAG"; then
            HAS_BASE=true
          fi

          SUFFIX_TAGS=$(echo "$ALL_TAGS" | grep "^refs/tags/v${TODAY}-" || true)

          if [ "$HAS_BASE" = false ] && [ -z "$SUFFIX_TAGS" ]; then
            VERSION="${TODAY}"
          else
            MAX_N=0
            if [ -n "$SUFFIX_TAGS" ]; then
              MAX_N=$(echo "$SUFFIX_TAGS" | sed "s|refs/tags/v${TODAY}-||" | sort -n | tail -1)
            fi
            VERSION="${TODAY}-$((MAX_N + 1))"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --draft \
            --notes "## What's Changed\n\n<!-- Add release notes here before publishing -->"

  # On release published: publish to npm
  publish-npm:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --tag latest

  # On release published: publish to ClawHub (independent of npm)
  publish-clawhub:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to ClawHub
        run: |
          npm i -g clawhub
          clawhub login --token ${{ secrets.CLAWHUB_TOKEN }} --no-browser
          clawhub package publish . --name @vauxr/openclaw --version "${{ steps.version.outputs.version }}" --source-repo ${{ github.repository }} --source-commit ${{ github.sha }} --source-ref ${{ github.event.release.tag_name }}
